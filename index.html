<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YourValueMatch | Hack Your Shopping Algorithm</title>
    <style>
        :root {
            --bg-canvas: #faf9f6;
            --card-surface: #ffffff;
            --text-primary: #0f172a;
            --electric-lilac: linear-gradient(135deg, #c084fc 0%, #818cf8 100%);
            
            --match-high: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            --match-mid: linear-gradient(135deg, #fb923c 0%, #f97316 100%);
            --match-low: linear-gradient(135deg, #f87171 0%, #ef4444 100%);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
            background-color: var(--bg-canvas);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 440px;
            min-height: 100vh;
            background: var(--card-surface);
            padding: 32px 24px;
            box-sizing: border-box;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.02);
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: var(--electric-lilac);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .context-badge {
            display: inline-block;
            margin-top: 10px;
            padding: 6px 16px;
            border-radius: 30px;
            background: rgba(129, 140, 248, 0.08);
            color: #4f46e5;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: -0.2px;
        }

        .live-preview-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 36px;
            text-align: center;
            border: 1px solid rgba(168, 85, 247, 0.08);
        }

        .preview-title {
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .score-circle {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin: 0 auto 14px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 26px;
            font-weight: 800;
            background: var(--match-low);
            box-shadow: 0 8px 20px rgba(248, 113, 113, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .slider-wrapper {
            margin-bottom: 30px;
        }

        .slider-meta {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 12px;
            letter-spacing: -0.3px;
        }

        .slider-percentage {
            color: #818cf8;
            font-weight: 700;
        }

        .slider-input {
            width: 100%;
            height: 6px;
            border-radius: 20px;
            background: #f8f6f2;
            outline: none;
            -webkit-appearance: none;
            cursor: pointer;
        }

        .slider-input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #ffffff;
            border: 4.5px solid #818cf8;
            box-shadow: 0 4px 12px rgba(129, 140, 248, 0.25);
        }

        .primary-action {
            display: block;
            width: 100%;
            background: var(--electric-lilac);
            color: white;
            text-align: center;
            padding: 16px;
            border-radius: 14px;
            font-weight: 700;
            border: none;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(129, 140, 248, 0.2);
            margin-top: 44px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="logo">YourValueMatch</div>
        <div id="algoModeBadge" class="context-badge">Setting General Profile</div>
    </header>

    <div class="live-preview-card">
        <div class="preview-title">Current Engine Focus</div>
        <div class="score-circle" id="luminousScore">0%</div>
        <div style="font-size: 13px; color: #64748b; margin-top: 6px;" id="statusText">Sliders customizable</div>
    </div>

    <div class="slider-wrapper">
        <div class="slider-meta"><span>🛡️ Clean Composition</span><span class="slider-percentage" id="val1">0%</span></div>
        <input type="range" min="0" max="100" value="0" class="slider-input" id="track1">
    </div>

    <div class="slider-wrapper">
        <div class="slider-meta"><span>🤝 Ethical Labor</span><span class="slider-percentage" id="val2">0%</span></div>
        <input type="range" min="0" max="100" value="0" class="slider-input" id="track2">
    </div>

    <div class="slider-wrapper">
        <div class="slider-meta"><span>🌍 Circular Footprint</span><span class="slider-percentage" id="val3">0%</span></div>
        <input type="range" min="0" max="100" value="0" class="slider-input" id="track3">
    </div>

    <div class="slider-wrapper">
        <div class="slider-meta"><span>📈 Budget Efficiency</span><span class="slider-percentage" id="val4">0%</span></div>
        <input type="range" min="0" max="100" value="0" class="slider-input" id="track4">
    </div>

    <button class="primary-action" id="lockMatrixBtn">Lock Algorithm & Launch Feed</button>
</div>

<script src="app.js"></script>
</body>
</html>
