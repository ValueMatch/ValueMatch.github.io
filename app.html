<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YourValueMatch Engine</title>
    <style>
        :root {
            --bg-canvas: #faf9f6;
            --card-surface: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --electric-lilac: linear-gradient(135deg, #c084fc 0%, #818cf8 100%);
            --border-ui: rgba(129, 140, 248, 0.15);
            --match-green: #22c55e;
            --match-orange: #f97316;
            --match-red: #ef4444;
        }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
            background-color: var(--bg-canvas);
            color: var(--text-primary);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .app-container {
            width: 100%; max-width: 1200px; padding: 32px 24px; box-sizing: border-box;
            display: flex; flex-direction: column; gap: 24px;
        }

        header {
            width: 100%; display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 16px; border-bottom: 1px solid var(--border-ui);
        }

        .logo {
            font-size: 24px; font-weight: 800;
            background: var(--electric-lilac); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -1px; text-decoration: none;
        }
        .back-link { font-size: 13px; font-weight: 600; color: var(--text-secondary); text-decoration: none; cursor: pointer; }

        /* WORKSPACE LAYOUT */
        #workspaceWrapper { width: 100%; display: flex; flex-direction: column; gap: 24px; }
        .workspace-grid { display: grid; grid-template-columns: 360px 1fr; gap: 28px; align-items: start; }

        .config-sidebar { background: var(--card-surface); border: 1px solid var(--border-ui); border-radius: 24px; padding: 24px; display: flex; flex-direction: column; gap: 20px; }
        .config-header { font-size: 14px; font-weight: 800; text-transform: uppercase; color: #818cf8; letter-spacing: 0.5px; margin: 0; }
        
        .scan-container { position: relative; width: 100%; }
        .scan-input { width: 100%; padding: 14px 90px 14px 16px; border: 1px solid #cbd5e1; border-radius: 12px; font-size: 13px; box-sizing: border-box; outline: none; }
        .scan-action { position: absolute; right: 8px; top: 8px; background: #0f172a; color: white; border: none; padding: 8px 14px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; }

        .slider-item { display: flex; flex-direction: column; gap: 8px; }
        .slider-text { display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; }
        .slider-control { width: 100%; height: 6px; background: #f1f5f9; border-radius: 10px; -webkit-appearance: none; margin: 8px 0; }
        .slider-control::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: white; border: 4px solid #818cf8; cursor: pointer; }

        .scanned-hero-card { background: var(--card-surface); border: 1px solid var(--border-ui); border-radius: 24px; padding: 20px; display: flex; align-items: center; justify-content: space-between; }
        .media-box { width: 64px; height: 64px; border-radius: 12px; background: #f1f5f9; display: flex; align-items: center; justify-content: center; border: 1px solid #e2e8f0; }
        .match-score-large { font-size: 38px; font-weight: 900; color: var(--match-red); text-align: right; }

        .alternative-card { background: var(--card-surface); border: 1px solid var(--border-ui); border-radius: 24px; padding: 24px; display: flex; flex-direction: column; gap: 20px; margin-bottom: 20px; }
        .matrix-metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .metric-cell { background: #f8fafc; border: 1px solid #f1f5f9; padding: 12px; border-radius: 12px; }
        .cell-label { font-size: 10px; text-transform: uppercase; color: var(--text-secondary); font-weight: 800; }
        .cell-value { font-size: 13px; font-weight: 700; }
        .swap-button { background: #818cf8; color: white; border: none; width: 100%; padding: 16px; border-radius: 14px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
<div class="app-container">
    <header>
        <a href="#" class="logo">YourValueMatch</a>
        <span class="back-link" onclick="location.reload()">Reset Session</span>
    </header>

    <main id="workspaceWrapper">
        <div class="workspace-grid">
            <section class="config-sidebar">
                <h3 class="config-header" id="activeProfileLabel">Active Profile: User</h3>
                <div class="scan-container">
                    <input type="url" id="itemUrlInput" class="scan-input" value="https://www.amazon.co.uk/Burts-Bees-Lip-Balm-Pomegranate">
                    <button class="scan-action" id="triggerScanBtn">Scan URL</button>
                </div>
                <div class="slider-item">
                    <div class="slider-text"><span>🍃 Cruelty-Free</span><span id="vVal1">88%</span></div>
                    <input type="range" class="slider-control" id="sl1" min="0" max="100" value="88">
                </div>
                <div class="slider-item">
                    <div class="slider-text"><span>🧪 Clean Ingredients</span><span id="vVal2">100%</span></div>
                    <input type="range" class="slider-control" id="sl2" min="0" max="100" value="100">
                </div>
                <div class="slider-item">
                    <div class="slider-text"><span>📦 Low-Waste Pack</span><span id="vVal3">12%</span></div>
                    <input type="range" class="slider-control" id="sl3" min="0" max="100" value="12">
                </div>
            </section>

            <section class="stream-layout">
                <div class="scanned-hero-card">
                    <div>
                        <h3 id="displayProductTitle">Burt's Bees Lip Balm Pomegranate</h3>
                        <p id="displayDomain">amazon.co.uk</p>
                    </div>
                    <div class="match-score-large" id="computedScoreLabel">35%</div>
                </div>
                <div id="alternativesContainer"></div>
            </section>
        </div>
    </main>
</div>

<script>
    const sovrnMerchantCatalog = [
        { name: "Hurraw! Balm", price: "£4.10", metrics: { crueltyFree: 98, cleanIngredients: 95, lowWaste: 80 }, composition: "Organic Oils", labor: "Leaping Bunny", packaging: "Eco-Tube" },
        { name: "Dr. Bronner's Organic", price: "£3.75", metrics: { crueltyFree: 95, cleanIngredients: 90, lowWaste: 70 }, composition: "USDA Organic", labor: "Fair Trade", packaging: "PCR Plastic" }
    ];

    function recalibrateMatrix() {
        const cFreeUser = parseInt(document.getElementById('sl1').value);
        const cIngUser = parseInt(document.getElementById('sl2').value);
        const lWasteUser = parseInt(document.getElementById('sl3').value);

        document.getElementById('vVal1').textContent = cFreeUser + "%";
        document.getElementById('vVal2').textContent = cIngUser + "%";
        document.getElementById('vVal3').textContent = lWasteUser + "%";

        const alternativesContainer = document.getElementById('alternativesContainer');
        alternativesContainer.innerHTML = "";

        sovrnMerchantCatalog.forEach(product => {
            const card = document.createElement('div');
            card.className = "alternative-card";
            card.innerHTML = `
                <h4>${product.name}</h4>
                <div class="matrix-metrics-grid">
                    <div class="metric-cell"><div class="cell-label">Comp</div><div class="cell-value">${product.composition}</div></div>
                    <div class="metric-cell"><div class="cell-label">Labor</div><div class="cell-value">${product.labor}</div></div>
                    <div class="metric-cell"><div class="cell-label">Pack</div><div class="cell-value">${product.packaging}</div></div>
                </div>
                <button class="swap-button">Swap to ${product.name}</button>
            `;
            alternativesContainer.appendChild(card);
        });
    }

    document.querySelectorAll('.slider-control').forEach(s => s.addEventListener('input', recalibrateMatrix));
    document.getElementById('triggerScanBtn').addEventListener('click', recalibrateMatrix);
    window.onload = recalibrateMatrix;
</script>
</body>
</html>
