<script>
    document.addEventListener('DOMContentLoaded', () => {
        // Points directly to your live backend endpoint infrastructure
        const RENDER_BASE_URL = 'https://yourvaluematch-backend.onrender.com';

        const row1 = document.getElementById('vector1');
        const row2 = document.getElementById('vector2');
        const rad1 = document.getElementById('rad1');
        const rad2 = document.getElementById('rad2');
        const submitSetupBtn = document.getElementById('submitSetupBtn') || document.querySelector('.action-btn');

        if (row1 && row2 && rad1 && rad2) {
            row1.addEventListener('click', () => { 
                row1.classList.add('active'); 
                row2.classList.remove('active'); 
                rad1.checked = true; 
            });
            row2.addEventListener('click', () => { 
                row2.classList.add('active'); 
                row1.classList.remove('active'); 
                rad2.checked = true; 
            });
        }

        if (submitSetupBtn) {
            submitSetupBtn.addEventListener('click', async (e) => {
                e.preventDefault();
                
                const emailField = document.getElementById('userEmailField') || document.querySelector('input[type="email"]');
                if (!emailField) return;

                const emailValue = emailField.value.trim();
                if(!emailValue || !emailValue.includes('@')) {
                    return alert('Please input a valid identity email address.');
                }
                
                // Track baseline onboarding selection
                const selectedPillar = (rad1 && rad1.checked) ? 'clean' : 'labor';
                
                // 1. Establish the browser context states for swift client-side personalizations
                try {
                    localStorage.setItem('userEmail', emailValue);
                    localStorage.setItem('userAuthenticated', 'true');
                    localStorage.setItem('vm_initial_pillar', selectedPillar);
                    
                    // Create an anonymized token matching your historical matrices tracking schema
                    const shortHash = btoa(emailValue).substring(0, 8);
                    localStorage.setItem('vm_anonymized_id', 'usr_' + shortHash);
                } catch(err) {
                    console.warn("Local secure container context write locked.", err);
                }
                
                // 2. Stream user identity anchor into your live database users asset table
                try {
                    const response = await fetch(`${RENDER_BASE_URL}/api/signup`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            email: emailValue,
                            primaryPillar: selectedPillar
                        })
                    });
                    
                    if (!response.ok) throw new Error('Cloud platform gateway rejected payload connection.');
                    console.log("Core profile row initialized successfully inside cloud repository.");
                    
                } catch (netErr) {
                    // Fallback routing prevents user-facing errors if network traffic bottlenecks
                    console.error("Database entry deferred. Routing forward to preserve smooth UX pipeline.", netErr);
                }
                
                // 3. Clear workspace views and transition into main interactive engine app
                window.location.href = 'app.html';
            });
        }
    });
</script>
